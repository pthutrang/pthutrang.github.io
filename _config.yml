theme: "minima"

rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other

collections:
  projects:
    output: true
    permalink: /:collection/:name

header_pages:
  - about.md
  - projects_index.md
  - archive.md
